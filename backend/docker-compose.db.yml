services:
  postgres:
    image: postgres:16-alpine
    container_name: sutra-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sutra
    ports:
      - "5432:5432"
    volumes:
      - sutra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sutra"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  sutra_postgres_data:
